<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Регистрация — LivePoll</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  </head>
  <body>
    <header class="header">
      <div class="container">
        <h1 onclick="location.href='index.html'" style="cursor:pointer"><i class="fas fa-poll"></i> LivePoll</h1>
        <nav class="nav">
          <button class="nav-btn" onclick="location.href='login.html'">
            <i class="fas fa-user"></i> Вход
          </button>
          <button class="nav-btn" onclick="location.href='index.html'">
            <i class="fas fa-home"></i> На главную
          </button>
        </nav>
      </div>
    </header>

    <main class="auth-page">
      <div class="auth-card">
        <div class="auth-icon"><i class="fas fa-user-plus"></i></div>
        <h2>Регистрация</h2>

        <div class="auth-error" id="authError">
          <i class="fas fa-exclamation-circle"></i>
          <span id="errorText"></span>
        </div>

        <div class="input-group">
          <i class="fas fa-user input-icon"></i>
          <input type="text" id="regUsername" placeholder="Имя пользователя" />
        </div>

        <div class="input-group">
          <i class="fas fa-envelope input-icon"></i>
          <input type="email" id="regEmail" placeholder="Email" />
        </div>

        <div class="input-group">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" id="regPassword" placeholder="Пароль" />
          <button class="password-toggle" type="button" onclick="togglePassword('regPassword', this)">
            <i class="fas fa-eye"></i>
          </button>
        </div>

        <button id="registerSubmit" class="auth-submit">
          <span class="spinner"></span>
          <span class="btn-text"><i class="fas fa-user-plus"></i> Зарегистрироваться</span>
        </button>

        <div class="auth-links">
          <a href="login.html">Уже есть аккаунт? Войти</a>
        </div>
      </div>
    </main>

    <footer class="footer">
      <div class="container">
        <p><i class="fas fa-copyright"></i> 2026 Мареич Владислав ИС-41.</p>
      </div>
    </footer>

    <script>
      const API_BASE_URL = 'http://localhost:3000/api';

      function togglePassword(inputId, btn) {
        const input = document.getElementById(inputId);
        const icon = btn.querySelector('i');
        if (input.type === 'password') {
          input.type = 'text';
          icon.className = 'fas fa-eye-slash';
        } else {
          input.type = 'password';
          icon.className = 'fas fa-eye';
        }
      }

      function showError(msg) {
        const el = document.getElementById('authError');
        document.getElementById('errorText').textContent = msg;
        el.classList.add('show');
      }

      function hideError() {
        document.getElementById('authError').classList.remove('show');
      }

      function setLoading(loading) {
        const btn = document.getElementById('registerSubmit');
        if (loading) {
          btn.classList.add('loading');
          btn.disabled = true;
        } else {
          btn.classList.remove('loading');
          btn.disabled = false;
        }
      }

      document.getElementById('registerSubmit').addEventListener('click', async function() {
        hideError();
        const username = document.getElementById('regUsername').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;

        if (!username || !email || !password) {
          showError('Заполните все поля');
          return;
        }
        if (password.length < 4) {
          showError('Пароль должен быть минимум 4 символа');
          return;
        }

        setLoading(true);
        try {
          const response = await fetch(`${API_BASE_URL}/register`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, email, password }),
          });
          const data = await response.json();
          if (data.success) {
            localStorage.setItem('poll_user', JSON.stringify(data.user));
            location.href = 'viewer.html';
          } else {
            showError(data.error || 'Ошибка регистрации');
          }
        } catch (error) {
          showError('Ошибка подключения к серверу');
        } finally {
          setLoading(false);
        }
      });

      document.querySelectorAll('.input-group input').forEach(inp => {
        inp.addEventListener('keydown', function(e) {
          if (e.key === 'Enter') document.getElementById('registerSubmit').click();
        });
      });
    </script>
  </body>
</html>
